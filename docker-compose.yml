services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hellofutsal
    ports:
      - "0001:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hellofutsal"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: hellofutsal
      DB_SYNCHRONIZE: false
      DB_MIGRATIONS_RUN: true
      JWT_SECRET: hellofutsal_dev_jwt_secret_2026_change_me
      JWT_EXPIRES_IN: 1d
    ports:
      - "1111:3000"

volumes:
  postgres_data:
